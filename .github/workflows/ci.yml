name: CI
on:
  pull_request:
  push:
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
      with:
        java-version: 17
        distribution: adopt
    - uses: sbt/setup-sbt@v1
    - uses: coursier/cache-action@v8
    - run: sbt -v "+ test"
    - run: rm -rf ~/.ivy2/local
